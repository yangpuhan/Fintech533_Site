<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-labelledby="title desc">
  <title id="title">Fintech 533 site banner</title>
  <desc id="desc">Abstract gradient banner with initials Y P</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e5f74"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="720" height="280" rx="16" fill="url(#bg)"/>
  <text x="360" y="175" text-anchor="middle" fill="#f8fafc" font-family="system-ui,Segoe UI,sans-serif" font-size="96" font-weight="700" letter-spacing="-2">YP</text>
  <text x="360" y="230" text-anchor="middle" fill="rgba(248,250,252,0.85)" font-family="system-ui,Segoe UI,sans-serif" font-size="22" font-weight="500">Fintech 533</text>
</svg>
